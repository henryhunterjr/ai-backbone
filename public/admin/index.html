<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — AI Backbone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a; color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* Auth wall */
    .auth-wall {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; flex-direction: column; gap: 1rem;
    }
    .auth-wall h1 { font-size: 1.4rem; color: #c8f55a; }
    .auth-wall p { color: #666; font-size: 0.85rem; }
    .auth-wall input {
      background: #141414; border: 1px solid #2a2a2a; border-radius: 8px;
      color: #e0e0e0; padding: 0.7rem 1rem; font-size: 1.1rem;
      text-align: center; width: 200px; letter-spacing: 0.3em; outline: none;
    }
    .auth-wall input:focus { border-color: #c8f55a; }
    .auth-wall .error { color: #ff6b6b; font-size: 0.8rem; min-height: 1.2rem; }

    .hidden { display: none !important; }

    /* Dashboard layout */
    .dashboard { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }

    .header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1.5rem; border-bottom: 1px solid #1a1a1a; padding-bottom: 1rem;
    }
    .header h1 { font-size: 1.2rem; color: #c8f55a; }
    .header .nav { display: flex; gap: 0.5rem; }
    .header .nav button {
      background: #141414; border: 1px solid #2a2a2a; border-radius: 6px;
      color: #999; padding: 0.4rem 0.8rem; font-size: 0.8rem; cursor: pointer;
      transition: all 0.15s;
    }
    .header .nav button.active { border-color: #c8f55a; color: #c8f55a; }
    .header .nav button:hover { border-color: #444; color: #e0e0e0; }

    /* Stats cards */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 0.75rem; margin-bottom: 1.5rem;
    }
    .stat-card {
      background: #141414; border: 1px solid #1e1e1e; border-radius: 10px;
      padding: 1rem;
    }
    .stat-card .label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 0.08em; }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: #c8f55a; margin-top: 0.25rem; }
    .stat-card .sub { font-size: 0.75rem; color: #555; margin-top: 0.15rem; }

    /* Chart section */
    .chart-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.5rem;
    }
    @media (max-width: 700px) { .chart-row { grid-template-columns: 1fr; } }

    .chart-card {
      background: #141414; border: 1px solid #1e1e1e; border-radius: 10px;
      padding: 1rem;
    }
    .chart-card h3 { font-size: 0.8rem; color: #888; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }

    .bar-chart { display: flex; flex-direction: column; gap: 0.4rem; }
    .bar-row { display: flex; align-items: center; gap: 0.5rem; }
    .bar-label { width: 90px; font-size: 0.75rem; color: #888; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-track { flex: 1; height: 20px; background: #1a1a1a; border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; background: #c8f55a; border-radius: 4px; transition: width 0.5s; min-width: 2px; }
    .bar-count { width: 30px; font-size: 0.75rem; color: #666; }

    /* Tables */
    .section { margin-bottom: 1.5rem; }
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.75rem;
    }
    .section-header h2 { font-size: 0.95rem; color: #ccc; }

    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; font-size: 0.7rem; color: #666; text-transform: uppercase;
      letter-spacing: 0.06em; padding: 0.5rem 0.75rem; border-bottom: 1px solid #1e1e1e;
    }
    td {
      padding: 0.6rem 0.75rem; font-size: 0.8rem; color: #bbb;
      border-bottom: 1px solid #111; vertical-align: top;
    }
    tr:hover td { background: #111; }
    .content-cell { max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tag { display: inline-block; background: #1e1e1e; border-radius: 4px; padding: 0.1rem 0.4rem; font-size: 0.7rem; color: #888; margin-right: 0.25rem; }
    .cat-badge {
      display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px;
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
    }
    .cat-business { background: #1a2332; color: #60a5fa; }
    .cat-community { background: #1a2e1a; color: #86efac; }
    .cat-recipe { background: #2e2a1a; color: #fbbf24; }
    .cat-content { background: #2a1a2e; color: #c084fc; }
    .cat-insight { background: #1a2e2e; color: #67e8f9; }
    .cat-member { background: #2e1a1a; color: #fca5a5; }

    .delete-btn {
      background: none; border: 1px solid #2a1a1a; border-radius: 4px;
      color: #ff6b6b; font-size: 0.7rem; padding: 0.2rem 0.5rem; cursor: pointer;
    }
    .delete-btn:hover { background: #2a1a1a; }

    /* Users section */
    .add-form {
      display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap;
    }
    .add-form input {
      background: #141414; border: 1px solid #2a2a2a; border-radius: 6px;
      color: #e0e0e0; padding: 0.5rem 0.75rem; font-size: 0.8rem; outline: none;
    }
    .add-form input:focus { border-color: #c8f55a; }
    .add-form button {
      background: #c8f55a; color: #0a0a0a; border: none; border-radius: 6px;
      padding: 0.5rem 1rem; font-size: 0.8rem; font-weight: 600; cursor: pointer;
    }
    .add-form button:hover { opacity: 0.9; }

    /* Filters */
    .filters {
      display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center;
    }
    .filters select, .filters input {
      background: #141414; border: 1px solid #2a2a2a; border-radius: 6px;
      color: #e0e0e0; padding: 0.4rem 0.6rem; font-size: 0.8rem; outline: none;
    }
    .filters select:focus, .filters input:focus { border-color: #c8f55a; }

    .pagination {
      display: flex; justify-content: center; gap: 0.5rem; margin-top: 1rem;
    }
    .pagination button {
      background: #141414; border: 1px solid #2a2a2a; border-radius: 6px;
      color: #999; padding: 0.4rem 0.8rem; font-size: 0.8rem; cursor: pointer;
    }
    .pagination button:hover { border-color: #444; }
    .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
    .pagination .page-info { color: #555; font-size: 0.8rem; padding: 0.4rem 0; }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid #333; border-top: 2px solid #c8f55a;
      border-radius: 50%; animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty { text-align: center; padding: 2rem; color: #444; font-size: 0.85rem; }
  </style>
</head>
<body>

<!-- Auth Wall -->
<div id="auth" class="auth-wall">
  <h1>AI Backbone</h1>
  <p>Admin Dashboard</p>
  <input type="password" id="pin" placeholder="PIN" maxlength="20" autocomplete="off">
  <div id="auth-error" class="error"></div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="dashboard hidden">
  <div class="header">
    <h1>AI Backbone Admin</h1>
    <div class="nav">
      <button class="active" onclick="switchTab('overview')">Overview</button>
      <button onclick="switchTab('memories')">Memories</button>
      <button onclick="switchTab('users')">Users</button>
    </div>
  </div>

  <!-- Overview Tab -->
  <div id="tab-overview">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="chart-row" id="chart-row"></div>
    <div class="section">
      <div class="section-header"><h2>Recent Memories</h2></div>
      <table>
        <thead><tr><th>Content</th><th>Category</th><th>Source</th><th>When</th></tr></thead>
        <tbody id="recent-table"></tbody>
      </table>
    </div>
  </div>

  <!-- Memories Tab -->
  <div id="tab-memories" class="hidden">
    <div class="filters">
      <input type="text" id="mem-search" placeholder="Search memories..." style="flex:1;min-width:200px;">
      <select id="mem-category">
        <option value="">All categories</option>
        <option value="business">Business</option>
        <option value="community">Community</option>
        <option value="content">Content</option>
        <option value="insight">Insight</option>
        <option value="recipe">Recipe</option>
        <option value="member">Member</option>
      </select>
      <select id="mem-source">
        <option value="">All sources</option>
        <option value="claude-code">Claude Code</option>
        <option value="chatgpt">ChatGPT</option>
        <option value="claude_session">Claude</option>
        <option value="manual">Manual</option>
        <option value="research">Research</option>
        <option value="perplexity">Perplexity</option>
      </select>
    </div>
    <table>
      <thead><tr><th>Content</th><th>Category</th><th>Source</th><th>Imp</th><th>Tags</th><th>When</th><th></th></tr></thead>
      <tbody id="memories-table"></tbody>
    </table>
    <div class="pagination" id="mem-pagination"></div>
  </div>

  <!-- Users Tab -->
  <div id="tab-users" class="hidden">
    <div class="add-form">
      <input type="email" id="user-email" placeholder="Email address" style="flex:1;min-width:200px;">
      <input type="text" id="user-name" placeholder="Name (optional)" style="width:150px;">
      <input type="text" id="user-notes" placeholder="Notes (optional)" style="width:200px;">
      <button onclick="addUser()">Add User</button>
    </div>
    <table>
      <thead><tr><th>Email</th><th>Name</th><th>Notes</th><th>Added</th><th></th></tr></thead>
      <tbody id="users-table"></tbody>
    </table>
    <div id="user-status" style="font-size:0.8rem;margin-top:0.5rem;min-height:1.2rem;"></div>
  </div>
</div>

<script>
  const API = window.location.origin;
  let pin = '';
  let currentTab = 'overview';
  let memPage = 1;
  let memDebounce = null;

  // Auth
  document.getElementById('pin').addEventListener('keydown', async (e) => {
    if (e.key !== 'Enter') return;
    pin = document.getElementById('pin').value.trim();
    if (!pin) return;

    try {
      const res = await fetch(`${API}/api/admin/stats`, { headers: { 'x-admin-pin': pin } });
      if (!res.ok) {
        document.getElementById('auth-error').textContent = 'Wrong PIN';
        return;
      }
      document.getElementById('auth').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      const data = await res.json();
      renderOverview(data);
    } catch (err) {
      document.getElementById('auth-error').textContent = 'Connection failed';
    }
  });

  // Tabs
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    document.querySelector(`.nav button[onclick="switchTab('${tab}')"]`).classList.add('active');
    ['overview', 'memories', 'users'].forEach(t => {
      document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab);
    });
    if (tab === 'memories') loadMemories();
    if (tab === 'users') loadUsers();
  }

  // Overview
  function renderOverview(data) {
    const grid = document.getElementById('stats-grid');
    grid.innerHTML = `
      <div class="stat-card"><div class="label">Total Memories</div><div class="value">${data.totalMemories}</div></div>
      <div class="stat-card"><div class="label">Member Profiles</div><div class="value">${data.totalMembers}</div></div>
      <div class="stat-card"><div class="label">Daily Briefs</div><div class="value">${data.totalBriefs}</div></div>
      <div class="stat-card"><div class="label">Insights</div><div class="value">${data.totalInsights}</div></div>
    `;

    const chartRow = document.getElementById('chart-row');
    const maxCat = Math.max(...Object.values(data.byCategory), 1);
    const maxSrc = Math.max(...Object.values(data.bySource), 1);

    chartRow.innerHTML = `
      <div class="chart-card">
        <h3>By Category</h3>
        <div class="bar-chart">
          ${Object.entries(data.byCategory).sort((a, b) => b[1] - a[1]).map(([k, v]) => `
            <div class="bar-row">
              <div class="bar-label">${k}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${(v / maxCat * 100).toFixed(0)}%"></div></div>
              <div class="bar-count">${v}</div>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="chart-card">
        <h3>By Source</h3>
        <div class="bar-chart">
          ${Object.entries(data.bySource).sort((a, b) => b[1] - a[1]).map(([k, v]) => `
            <div class="bar-row">
              <div class="bar-label">${k}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${(v / maxSrc * 100).toFixed(0)}%"></div></div>
              <div class="bar-count">${v}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;

    const tbody = document.getElementById('recent-table');
    tbody.innerHTML = (data.recent || []).map(m => `
      <tr>
        <td class="content-cell" title="${esc(m.content)}">${esc(m.content)}</td>
        <td><span class="cat-badge cat-${m.category || 'insight'}">${m.category || '—'}</span></td>
        <td>${m.source || '—'}</td>
        <td style="white-space:nowrap;color:#555;">${timeAgo(m.created_at)}</td>
      </tr>
    `).join('');
  }

  // Memories
  async function loadMemories() {
    const search = document.getElementById('mem-search').value.trim();
    const category = document.getElementById('mem-category').value;
    const source = document.getElementById('mem-source').value;

    const params = new URLSearchParams({ page: memPage, limit: 25 });
    if (search) params.set('search', search);
    if (category) params.set('category', category);
    if (source) params.set('source', source);

    try {
      const res = await fetch(`${API}/api/admin/memories?${params}`, { headers: { 'x-admin-pin': pin } });
      const data = await res.json();
      const tbody = document.getElementById('memories-table');
      if (!data.memories.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty">No memories found</td></tr>';
      } else {
        tbody.innerHTML = data.memories.map(m => `
          <tr>
            <td class="content-cell" title="${esc(m.content)}">${esc(m.content)}</td>
            <td><span class="cat-badge cat-${m.category || 'insight'}">${m.category || '—'}</span></td>
            <td>${m.source || '—'}</td>
            <td style="text-align:center;">${'★'.repeat(m.importance || 0)}</td>
            <td>${(m.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('')}</td>
            <td style="white-space:nowrap;color:#555;">${timeAgo(m.created_at)}</td>
            <td><button class="delete-btn" onclick="deleteMemory('${m.id}')">Delete</button></td>
          </tr>
        `).join('');
      }

      const pag = document.getElementById('mem-pagination');
      pag.innerHTML = `
        <button ${memPage <= 1 ? 'disabled' : ''} onclick="memPage--;loadMemories();">Prev</button>
        <span class="page-info">Page ${data.page} of ${data.pages}</span>
        <button ${memPage >= data.pages ? 'disabled' : ''} onclick="memPage++;loadMemories();">Next</button>
      `;
    } catch (err) {
      console.error(err);
    }
  }

  async function deleteMemory(id) {
    if (!confirm('Delete this memory?')) return;
    await fetch(`${API}/api/admin/memories`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json', 'x-admin-pin': pin },
      body: JSON.stringify({ id }),
    });
    loadMemories();
  }

  // Debounce filters
  ['mem-search', 'mem-category', 'mem-source'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      clearTimeout(memDebounce);
      memPage = 1;
      memDebounce = setTimeout(loadMemories, 300);
    });
    document.getElementById(id).addEventListener('change', () => { memPage = 1; loadMemories(); });
  });

  // Users
  async function loadUsers() {
    try {
      const res = await fetch(`${API}/api/admin/users`, { headers: { 'x-admin-pin': pin } });
      const data = await res.json();
      const tbody = document.getElementById('users-table');
      if (!data.users || !data.users.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty">No users yet. Add one above.</td></tr>';
      } else {
        tbody.innerHTML = data.users.map(u => `
          <tr>
            <td>${esc(u.email)}</td>
            <td>${esc(u.name || '—')}</td>
            <td>${esc(u.notes || '—')}</td>
            <td style="white-space:nowrap;color:#555;">${timeAgo(u.created_at)}</td>
            <td><button class="delete-btn" onclick="deleteUser('${esc(u.email)}')">Remove</button></td>
          </tr>
        `).join('');
      }
    } catch (err) {
      showUserStatus('Failed to load users', true);
    }
  }

  async function addUser() {
    const email = document.getElementById('user-email').value.trim();
    const name = document.getElementById('user-name').value.trim();
    const notes = document.getElementById('user-notes').value.trim();
    if (!email) { showUserStatus('Email is required', true); return; }

    try {
      const res = await fetch(`${API}/api/admin/users`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-pin': pin },
        body: JSON.stringify({ email, name, notes }),
      });
      const data = await res.json();
      if (data.success) {
        showUserStatus(`Added ${email}`, false);
        document.getElementById('user-email').value = '';
        document.getElementById('user-name').value = '';
        document.getElementById('user-notes').value = '';
        loadUsers();
      } else {
        showUserStatus(data.error, true);
      }
    } catch (err) {
      showUserStatus('Network error', true);
    }
  }

  async function deleteUser(email) {
    if (!confirm(`Remove ${email}?`)) return;
    await fetch(`${API}/api/admin/users`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json', 'x-admin-pin': pin },
      body: JSON.stringify({ email }),
    });
    loadUsers();
  }

  function showUserStatus(msg, isErr) {
    const el = document.getElementById('user-status');
    el.textContent = msg;
    el.style.color = isErr ? '#ff6b6b' : '#c8f55a';
    if (!isErr) setTimeout(() => { el.textContent = ''; }, 4000);
  }

  // Helpers
  function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function timeAgo(ts) {
    const d = Date.now() - new Date(ts).getTime();
    if (d < 60000) return 'just now';
    if (d < 3600000) return Math.floor(d / 60000) + 'm ago';
    if (d < 86400000) return Math.floor(d / 3600000) + 'h ago';
    if (d < 2592000000) return Math.floor(d / 86400000) + 'd ago';
    return new Date(ts).toLocaleDateString();
  }
</script>
</body>
</html>
